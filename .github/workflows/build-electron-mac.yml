name: Build macOS (Electron + R.framework)

on:
  workflow_dispatch:

  push:
    branches:
      - master
      - main
    paths:
      - "electron/**"
      - "R/**"
      - "app.R"
      - "DESCRIPTION"
      - "package.json"
      - ".github/workflows/build-electron-mac.yml"

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    # Signing / notarization creds — kept as commented stubs for when an
    # Apple Developer account is available.  Without them electron-builder
    # does ad-hoc signing, which is enough for hardenedRuntime entitlements
    # but triggers Gatekeeper warnings on first launch (users must
    # right-click → Open, then drag the app into /Applications).
    env:
      # SKIP_NOTARIZE: "true"
      # P12_BASE64: ${{ secrets.P12_BASE64 }}
      # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
      # APPLE_ID_PASSWORD: ${{ secrets.MAC_APPLE_ID_PASSWORD }}
      # APPLE_TEAM_ID: ${{ secrets.MAC_APPLE_TEAM_ID }}
      # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MAC_APP_SPECIFIC_PASSWORD }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package directory
        id: detect-pkgdir
        run: |
          set -euo pipefail

          if [ -f "electron/package.json" ]; then
            PACKAGE_DIR="electron"
          elif [ -f "package.json" ]; then
            PACKAGE_DIR="."
          else
            echo "package.json not found at repo root or electron/" >&2
            exit 1
          fi

          echo "PACKAGE_DIR=$PACKAGE_DIR" >> "$GITHUB_ENV"
          echo "PACKAGE_DIR = $PACKAGE_DIR"

      - name: Detect R package source (idepGolem)
        run: |
          set -euo pipefail
          desc_path=$(grep -rl "^Package:[[:space:]]*idepGolem\b" . || true)
          if [ -z "$desc_path" ]; then
            echo "idepGolem package source not found" >&2
            exit 1
          fi
          PKG_SRC=$(dirname "$desc_path" | head -n 1)
          echo "PKG_SRC=$PKG_SRC" >> "$GITHUB_ENV"
          echo "PKG_SRC = $PKG_SRC"

      - name: Detect package name from DESCRIPTION
        run: |
          set -euo pipefail
          desc="$PKG_SRC/DESCRIPTION"
          if [ ! -f "$desc" ]; then
            echo "DESCRIPTION not found at: $desc" >&2
            exit 1
          fi
          PKG_NAME=$(grep "^Package:" "$desc" | head -n1 | awk '{print $2}')
          if [ -z "$PKG_NAME" ]; then
            echo "Could not parse Package field in: $desc" >&2
            exit 1
          fi
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "PKG_NAME = $PKG_NAME"

      - name: Fix invalid filename in R/ (leading underscore)
        run: |
          set -euo pipefail
          bad="$PKG_SRC/R/_disable_autoload.R"
          if [ -f "$bad" ]; then
            mv "$bad" "$PKG_SRC/R/z_disable_autoload.R"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.PACKAGE_DIR }}/package-lock.json

      - name: Install npm deps
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          set -euxo pipefail
          if [ -f package-lock.json ]; then
            npm ci || (rm -rf node_modules && npm install --no-fund --no-audit)
          else
            npm install --no-fund --no-audit
          fi

      - name: Ensure electron-builder present
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          set -euxo pipefail
          if ! npx --yes --package=electron-builder@26.8.2 --call "echo ok" >/dev/null 2>&1; then
            npm install -D electron-builder@26.8.2
          fi

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      # Mirror R.home() into runtime/R.framework/Resources, then patch
      # hardcoded /Library/Frameworks paths in bin/R so the runtime is
      # relocatable inside the .app bundle.
      - name: Stage R.framework (mirror R.home + patch for relocation)
        run: |
          set -euo pipefail
          RHOME=$(Rscript -e "cat(R.home())")
          if [ -z "$RHOME" ]; then
            echo "Could not get R.home()" >&2
            exit 1
          fi

          dst_root="${PACKAGE_DIR}/runtime/R.framework"
          dst="${dst_root}/Resources"

          mkdir -p "$dst"
          rsync -a "${RHOME}/" "${dst}/"

          echo "RHOME         = $RHOME"
          echo "Bundled ROOT  = $dst_root"
          echo "Bundled RHOME = $dst"

          if [ -f "${dst}/bin/Rscript" ]; then
            chmod +x "${dst}/bin/Rscript"
          fi

          # Patch hardcoded R_HOME_DIR in bin/R so the runtime is portable.
          bash electron/scripts/patch_r_mac.sh "$dst"

      - name: Resolve bundled paths (debug)
        run: |
          set -euo pipefail
          app="$PACKAGE_DIR"
          rscript="$app/runtime/R.framework/Resources/bin/Rscript"
          lib="$app/runtime/R.framework/Resources/library"
          echo "APP:      $app"
          echo "Rscript:  $rscript"
          echo "LIB PATH: $lib"
          if [ ! -x "$rscript" ]; then
            echo "Bundled Rscript not found or not executable: $rscript" >&2
            ls -R "$app/runtime" || true
            exit 1
          fi
          mkdir -p "$lib"

      # Shared across all three platforms.  Reads Imports + Remotes from
      # DESCRIPTION, installs via PPM-pinned CRAN + Bioc snapshots using
      # pak::local_install_deps().  Do not duplicate logic here.
      - name: Install R packages via PPM snapshot
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rscript="$PACKAGE_DIR/runtime/R.framework/Resources/bin/Rscript"
          lib="$PACKAGE_DIR/runtime/R.framework/Resources/library"
          "$rscript" --no-save --no-restore electron/scripts/install_packages.R "$lib"

      - name: Build and install idepGolem into R.framework/Resources/library
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
          R_BUILD_DONTFAIL_ON_WARNING_: "true"
          R_BUILD_TAR: tar
          TAR: tar
        run: |
          set -euo pipefail
          app="$PACKAGE_DIR"
          lib="$app/runtime/R.framework/Resources/library"
          Rexe="$app/runtime/R.framework/Resources/bin/R"
          libR="$lib"

          pushd "$PKG_SRC"
          "$Rexe" CMD build . --no-build-vignettes --no-manual
          tarball=$(ls -1t *.tar.gz | head -n1 || true)
          popd
          if [ -z "$tarball" ]; then
            echo "Package tarball not found after build" >&2
            exit 1
          fi
          export R_LIBS="$libR"
          export R_LIBS_USER="$libR"
          "$Rexe" CMD INSTALL --library="$lib" "$PKG_SRC/$tarball"

      - name: Stage app sources into electron/app
        run: |
          set -euo pipefail
          app="$PACKAGE_DIR"
          rm -rf "$app/app"
          mkdir -p "$app/app"
          cp -r "$PKG_SRC/R"        "$app/app/R"
          cp    "$PKG_SRC/app.R"    "$app/app/app.R"
          cp    "$PKG_SRC/DESCRIPTION" "$app/app/DESCRIPTION"

      - name: Verify required pkgs in bundled lib
        run: |
          set -euo pipefail
          r="$PACKAGE_DIR/runtime/R.framework/Resources/bin/Rscript"
          libR="$PACKAGE_DIR/runtime/R.framework/Resources/library"
          "$r" -e "lp <- '$libR'; cat('hgu133plus2.db:', 'hgu133plus2.db' %in% rownames(installed.packages(lib.loc=lp)), '\n')"

      # Pre-flight smoke test: exercise the bundled runtime the same way
      # bootstrap.R will at app launch, but without starting the shiny
      # server.  Catches install-time failures (missing deps, namespace
      # load errors, broken run_app()) in CI instead of on the user's Mac.
      - name: Smoke-test bundled R runtime
        run: |
          set -euo pipefail
          rscript="$PACKAGE_DIR/runtime/R.framework/Resources/bin/Rscript"
          lib="$PACKAGE_DIR/runtime/R.framework/Resources/library"

          cat > smoke_test.R << 'EOF'
          args <- commandArgs(trailingOnly = TRUE)
          lib <- args[1]
          .libPaths(c(lib, .libPaths()))
          cat("[smoke] .libPaths() =", paste(.libPaths(), collapse = " | "), "\n")

          required <- c("ottoPlots", "idepGolem", "shiny",
                        "DESeq2", "ComplexHeatmap", "WGCNA")
          for (pkg in required) {
            if (!requireNamespace(pkg, quietly = TRUE)) {
              stop("[smoke] FAIL: package '", pkg, "' not loadable")
            }
            cat("[smoke] OK: requireNamespace(", pkg, ")\n", sep = "")
          }

          app <- idepGolem::run_app()
          if (!inherits(app, "shiny.appobj")) {
            stop("[smoke] FAIL: idepGolem::run_app() did not return a shiny.appobj")
          }
          cat("[smoke] OK: idepGolem::run_app() returned shiny.appobj\n")
          cat("[smoke] PASS: bundled R runtime is healthy\n")
          EOF

          "$rscript" --vanilla smoke_test.R "$lib"

      - name: Show current file descriptor limits
        run: |
          set -euxo pipefail
          ulimit -n
          sysctl kern.maxfiles
          sysctl kern.maxfilesperproc

      - name: Raise macOS file descriptor limits
        run: |
          set -euxo pipefail
          sudo sysctl -w kern.maxfiles=65536
          sudo sysctl -w kern.maxfilesperproc=65536
          ulimit -n 65536 || ulimit -n 16384 || ulimit -n 8192

      - name: Prune R library (docs, examples, tests)
        run: |
          set -euxo pipefail
          R_LIB="$PACKAGE_DIR/runtime/R.framework/Resources/library"

          find "$R_LIB" -type d \( \
            -name help -o -name doc -o -name docs -o \
            -name html -o -name examples -o -name demo -o \
            -name tests -o -name testthat -o -name unitTests -o \
            -name vignettes \
          \) -prune -exec rm -rf {} +

          find "$R_LIB" \( -name "*.so" -o -name "*.dylib" \) -exec strip -x {} \; || true

      - name: Build (npm run dist)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          set -euxo pipefail
          ulimit -n 65536 || ulimit -n 16384 || ulimit -n 8192
          npm run dist

      # - name: Notarize DMG (only on tags v*)
      #   working-directory: ${{ env.PACKAGE_DIR }}
      #   run: |
      #     set -euxo pipefail
      #     DMG_PATH=$(ls dist/*.dmg | head -n1)
      #     xcrun notarytool submit "$DMG_PATH" \
      #       --apple-id "$APPLE_ID" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --password "$APPLE_APP_SPECIFIC_PASSWORD" \
      #       --wait
      #     xcrun stapler staple "$DMG_PATH"
      #     xcrun stapler validate "$DMG_PATH"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: ${{ env.PACKAGE_DIR }}/dist/**
          if-no-files-found: error
          retention-days: 14
