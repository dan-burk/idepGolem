<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>iDEP – Starting…</title>
  <style>
    :root {
      --bg-0: #070b16;
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --text-0: #f8fafc;
      --text-1: #cbd5e1;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #22c55e;
      --accent-2: #10b981;
      --accent-3: #06b6d4;
      --border: rgba(148, 163, 184, 0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-0);
      background: radial-gradient(ellipse at 50% 35%, #142036 0%, var(--bg-1) 45%, var(--bg-0) 100%);
      -webkit-font-smoothing: antialiased;
      user-select: none;
      cursor: default;
    }

    .glow {
      position: absolute;
      top: 14%;
      left: 50%;
      width: 520px;
      height: 520px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(34, 197, 94, 0.18) 0%, rgba(6, 182, 212, 0.06) 35%, transparent 65%);
      filter: blur(40px);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.05); }
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 56px 80px;
      text-align: center;
    }

    .logo {
      width: 132px;
      height: 132px;
      background-image: var(--logo-uri);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 0 28px rgba(34, 197, 94, 0.4)) drop-shadow(0 8px 22px rgba(0, 0, 0, 0.55));
      margin-bottom: 24px;
    }

    .tagline {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-2);
      text-transform: uppercase;
    }

    .progress-block {
      margin-top: 38px;
      width: 100%;
      max-width: 460px;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.85);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border);
    }

    .progress-fill {
      position: relative;
      height: 100%;
      width: 8%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 50%, var(--accent-3) 100%);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.55);
      transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.35) 50%, transparent 100%);
      animation: shimmer 1.8s linear infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-1);
      letter-spacing: 0.01em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.7);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-top: 1px solid var(--border);
      background: rgba(7, 11, 22, 0.55);
      backdrop-filter: blur(6px);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.02em;
    }

    .footer .left  { white-space: nowrap; }
    .footer .right {
      flex: 1;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .footer code {
      font-family: "SF Mono", "Cascadia Mono", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 10px;
      color: var(--text-2);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .footer .sep {
      display: inline-block;
      width: 1px;
      height: 10px;
      background: var(--border);
      margin: 0 10px;
      vertical-align: middle;
    }

<body>
  <div class="glow"></div>

  <main class="container">
    <div class="logo" role="img" aria-label="iDEP logo"></div>
    <p class="tagline">Integrated Differential Expression &amp; Pathway Analysis</p>

    <div class="progress-block">
      <div class="progress">
        <div id="bar" class="progress-fill"></div>
      </div>
      <div class="status-row">
        <span class="dot"></span>
        <span id="status">Preparing runtime…</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="left">iDEP&nbsp;&nbsp;v2.4.4<span class="sep"></span>South Dakota State University</div>
    <div class="right">Log:&nbsp;<code id="logpath">{{LOG_FILE}}</code></div>
  </footer>

  <script>
    window.updateSplash = function(pct, text) {
      try {
        var bar = document.getElementById('bar');
        var label = document.getElementById('status');
        if (bar && typeof pct === 'number') {
          var clamped = Math.max(0, Math.min(100, pct));
          bar.style.width = clamped + '%';
        }
        if (label && text) {
          label.textContent = text;
        }
      } catch (e) {
        // ignore
      }
    };
  </script>
